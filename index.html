<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>R6 Operator Random Picker</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.column{
background:#1e293b;
padding:20px;
border-radius:10px;
width:300px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.pick{
background:#22c55e;
color:black;
}

.remove{
background:#ef4444;
color:white;
}

input{
padding:8px;
border-radius:5px;
border:none;
margin-top:10px;
}

.name{
display:flex;
justify-content:space-between;
align-items:center;
margin:3px 0;
}

.result{
font-size:28px;
margin:20px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Rainbow Six Operator Random Picker</h1>

<div class="result" id="result">Press a button to pick</div>

<button class="pick" onclick="pickRandom('defenders')">Pick Defender</button>
<button class="pick" onclick="pickRandom('attackers')">Pick Attacker</button>

<div class="container">

<div class="column">
<h2>Defenders</h2>
<div id="defenders"></div>
<input id="newDefender" placeholder="Add defender">
<button onclick="addName('defenders','newDefender')">Add</button>
</div>

<div class="column">
<h2>Attackers</h2>
<div id="attackers"></div>
<input id="newAttacker" placeholder="Add attacker">
<button onclick="addName('attackers','newAttacker')">Add</button>
</div>

</div>

<script>

let defenders = [
"Alibi","Aruni","Azami","Bandit","Castle","Caveira","Clash","Doc","Echo","Ela","Fenrir","Frost",
"Goyo","Jäger","Kaid","Kapkan","Lesion","Maestro","Melusi","Mira","Mozzie","Mute","Oryx","Pulse",
"Rook","Smoke","Solis","Tachanka","Thorn","Thunderbird","Tubarão","Valkyrie","Vigil","Wamai",
"Warden","Skopós","Denari","Sentry"
]

let attackers = [
"Ace","Amaru","Ash","Blackbeard","Blitz","Brava","Buck","Capitão","Deimos","Dokkaebi","Finka",
"Flores","Fuze","Glaz","Gridlock","Grim","Hibana","Iana","IQ","Jackal","Kali","Lion","Maverick",
"Montagne","Nøkk","Nomad","Osa","Ram","Sens","Sledge","Striker","Thatcher","Thermite","Twitch",
"Ying","Zero","Zofia","Rauora","Solid Snake"
]

let disabled = new Set()

function render(){

["defenders","attackers"].forEach(type=>{

let list = type==="defenders"?defenders:attackers
let container = document.getElementById(type)

container.innerHTML=""

list.forEach(name=>{

let div=document.createElement("div")
div.className="name"

let checkbox=document.createElement("input")
checkbox.type="checkbox"
checkbox.checked=!disabled.has(name)

checkbox.onchange=()=>{
if(checkbox.checked) disabled.delete(name)
else disabled.add(name)
}

let label=document.createElement("span")
label.textContent=name

let remove=document.createElement("button")
remove.textContent="X"
remove.className="remove"

remove.onclick=()=>{
let arr=type==="defenders"?defenders:attackers
arr.splice(arr.indexOf(name),1)
disabled.delete(name)
render()
}

div.appendChild(checkbox)
div.appendChild(label)
div.appendChild(remove)

container.appendChild(div)

})

})

}

function pickRandom(type){

let list = type==="defenders"?defenders:attackers

let active=list.filter(x=>!disabled.has(x))

if(active.length===0){
document.getElementById("result").textContent="No operators enabled!"
return
}

let choice=active[Math.floor(Math.random()*active.length)]

document.getElementById("result").textContent=choice

}

function addName(type,inputId){

let input=document.getElementById(inputId)

if(!input.value) return

if(type==="defenders") defenders.push(input.value)
else attackers.push(input.value)

input.value=""

render()

}

render()

</script>

</body>
</html>
